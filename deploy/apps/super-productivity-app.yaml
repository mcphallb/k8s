apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: super-productivity-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mcphallb/k8s.git
    targetRevision: HEAD
    path: deploy/components/super-productivity
  destination:
    server: https://kubernetes.default.svc
    namespace: super-productivity
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
