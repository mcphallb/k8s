apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.7.0
    helm:
      releaseName: argocd
      values: |
        server:
          # This ensures the pod itself starts in HTTP mode to match probes
          extraArgs:
            - --insecure
          service:
            type: LoadBalancer
            # Modern MetalLB annotation for static IP
            annotations: 
              metallb.universe.tf/loadBalancerIPs: 192.168.30.202
        repoServer:
          service:
            # Keep your custom port if needed
            targetPort: 8081
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
