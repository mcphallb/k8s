apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.7.0
    helm:
      releaseName: argocd
      values: |
        server:
          service:
            type: LoadBalancer
            # This ensures the service routes to the right internal port
            targetPort: 8080


        repoServer:
          service:
            targetPort: 8081
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
