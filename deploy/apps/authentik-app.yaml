apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    targetRevision: 2026.2.1
    chart: authentik
    helm:
      values: |
        authentik:
          # This one line injects EVERYTHING from your Vault secret
          envFrom:
            - secretRef:
                name: authentik-secrets
          postgresql:
            user: file:///postgres-creds/username
            password: file:///postgres-creds/password

        # Database Server Configuration
        postgresql:
          enabled: true

        worker:
          volumes:
            - name: postgres-creds
              secret:
                secretName: authentik-postgres-credentials
          volumeMounts:
            - name: postgres-creds
              mountPath: /postgres-creds
              readOnly: true          

        # Traefik Ingress Configuration
        server:
          ingress:
            enabled: true
            ingressClassName: "traefik"
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - authentik.nibblesnbits.org
            volumes:
              - name: postgres-creds
                secret:
                  secretName: authentik-postgres-credentials
            volumeMounts:
              - name: postgres-creds
                mountPath: /postgres-creds
                readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  
  syncPolicy:
#    automated:
#      prune: true
#      selfHeal: true
    createNamespace: true
---
# 1. THE CONNECTION
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: authentik-vault-conn
  namespace: authentik
spec:
  # Using the internal K8s DNS name for Vault
  address: http://vault-server.vault.svc.cluster.local:8200 

---
# 3. THE AUTH
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: authentik-vault-auth  # <--- This name must match the Ref below
  namespace: authentik
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: authentik-vault-conn
  kubernetes:
    role: authentik-role
    serviceAccount: default

---
# 3. THE SECRET
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  type: kv-v2
  mount: secret 
  path: authentik/secretkey
  destination:
    name: authentik-secrets 
    create: true
  vaultAuthRef: authentik-vault-auth # <--- This now points to the correct name
---
# 3. THE SECRET
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-postgres-credentials
  namespace: authentik
spec:
  type: kv-v2
  mount: secret 
  path: authentik/postgres-credentials
  destination:
    name: authentik-postgres-credentials
    create: true
  vaultAuthRef: authentik-vault-auth # <--- This now points to the correct name