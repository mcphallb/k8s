apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    targetRevision: 2026.2.1
    chart: authentik
    helm:
      values: |
        authentik:
          # Tell Authentik not to create its own secret
          enabled: true 
          # You can use a placeholder for the secret_key here 
          # because we override it with the env var below

        # Ensure the sub-charts (Postgres/Redis) also use the secret
        postgresql:
          enabled: true
          auth:
            existingSecret: ""
        
        redis:
          enabled: true
          auth:
            existingSecret: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  
  syncPolicy:
#    automated:
#      prune: true
#      selfHeal: true
    createNamespace: true