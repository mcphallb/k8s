apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    targetRevision: 2026.2.1
    chart: authentik
    helm:
      values: |
        global:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_SECRET_KEY 
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_POSTGRESQL__NAME

        authentik:
          error_reporting:
            enabled: true

        server:
          ingress:
            enabled: true
            ingressClassName: "traefik"
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - authentik.nibblesnbits.org
          
        postgresql:
          enabled: true
          auth:
            # Tell Postgres to pull the password from your Vault secret
            existingSecret: "authentik-secrets"
            secretKeys:
              userPasswordKey: "AUTHENTIK_POSTGRESQL__PASSWORD"
              adminPasswordKey: "AUTHENTIK_POSTGRESQL__PASSWORD"
          primary:
            persistence:
              enabled: true
              # Match your PVC name if you created one manually, 
              # or leave commented out to let Helm create it
              # existingClaim: authentik-pg-volume

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  
  syncPolicy:
#    automated:
#      prune: true
#      selfHeal: true
    createNamespace: true
---
# 1. THE CONNECTION
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: authentik-vault-conn
  namespace: authentik
spec:
  # Using the internal K8s DNS name for Vault
  address: http://vault-server.vault.svc.cluster.local:8200 

---
# 3. THE AUTH
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: authentik-vault-auth  # <--- This name must match the Ref below
  namespace: authentik
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: authentik-vault-conn
  kubernetes:
    role: authentik-role
    serviceAccount: default

---
# 3. THE SECRET
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  type: kv-v2
  mount: secret 
  path: nibblesnbits/authentik
  destination:
    name: authentik-secrets 
    create: true
  vaultAuthRef: authentik-vault-auth # <--- This now points to the correct name
---
