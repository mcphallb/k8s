apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    targetRevision: 2026.2.1
    chart: authentik
    helm:
      values: |
        authentik:
          # 1. Provide the Secret Key from Vault
          extraEnvVars:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
            # 2. Map the DB password for the Authentik app (client side)
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgres-password
          
          error_reporting:
            enabled: true

        # 3. Database Server Configuration
        postgresql:
          enabled: true
          auth:
            existingSecret: "authentik-secrets"
            secretKeys:
              userPasswordKey: "postgres-password"
              adminPasswordKey: "postgres-password"

        # 4. Traefik Ingress Configuration
        server:
          ingress:
            enabled: true
            ingressClassName: "traefik" # Specifically tell K8s to use Traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
              traefik.ingress.kubernetes.io/router.tls: "true"
              # cert-manager annotation (optional, if you use it)
              # cert-manager.io/cluster-issuer: "letsencrypt-prod"
            hosts:
              - authentik.nibblesnbits.org
            paths:
              - /
            tls:
              - hosts:
                  - authentik.nibblesnbits.org
                secretName: authentik-tls-cert

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  
  syncPolicy:
#    automated:
#      prune: true
#      selfHeal: true
    createNamespace: true
---
# 1. THE CONNECTION
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: authentik-vault-conn
  namespace: authentik
spec:
  # Using the internal K8s DNS name for Vault
  address: http://vault-server.vault.svc.cluster.local:8200 

---
# 3. THE AUTH
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: authentik-vault-auth  # <--- This name must match the Ref below
  namespace: authentik
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: authentik-vault-conn
  kubernetes:
    role: authentik-role
    serviceAccount: default

---
# 3. THE SECRET
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  type: kv-v2
  mount: secret 
  path: nibblesnbits/authentik
  destination:
    name: authentik-secrets 
    create: true
  vaultAuthRef: authentik-vault-auth # <--- This now points to the correct name