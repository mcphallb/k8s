apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-gitops
  namespace: argocd
spec:
  project: default
  sources:
    - chart: gitea
      repoURL: 'https://dl.gitea.com/charts/' # The Helm repo
      targetRevision: 12.5.0
      helm:
        valueFiles:
          - $values/deploy/components/gitea/value.yaml
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gitea
  syncPolicy:
    automated:                             # Enables the "GitOps" auto-sync
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: gitea-ssh
  namespace: gitea
spec:
  entryPoints:
    - gitea-ssh
  routes:
    - match: HostSNI(`*`) # SSH doesn't support SNI, so we use a wildcard
      services:
        - name: gitea-ssh # Name of your Gitea SSH service
          port: 22         # Internal port Gitea listens on