apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meshmonitor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Yeraze/meshmonitor.git'
    targetRevision: HEAD
    path: 'helm/meshmonitor'
    helm:
      values: |
        replicaCount: 1
        ingress:
          enabled: true
        # --- Add Persistence section below ---
        persistence:
          enabled: true
          existingClaim: meshmonitor-nfs-pvc
          mountPath: /data # Change this to the app's required data path
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: meshmonitor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
