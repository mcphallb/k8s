apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Replace with your actual GitOps repo
    repoURL: 'https://github.com/your-user/home-ops.git'
    targetRevision: HEAD
    # This points to the folder containing the YAMLs from our previous step
    path: apps/paperless 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: paperless-ngx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
