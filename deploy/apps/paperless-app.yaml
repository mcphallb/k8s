apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Installs after the operator is ready
spec:
  project: default
  source:
    # Replace with your actual GitOps repo
    repoURL: 'https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git'
    targetRevision: HEAD
    # This points to the folder containing the YAMLs from our previous step
    path: deploy/components/paperless 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: paperless-ngx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
