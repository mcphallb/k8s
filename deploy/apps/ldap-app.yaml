apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openldap-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
    targetRevision: HEAD
    path: deploy/components/openldap # Path to the LDAP manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openunison # Keep it in the same namespace as OpenUnison
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true