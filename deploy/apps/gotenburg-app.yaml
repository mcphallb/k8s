apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotenburg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Replace with your actual GitOps repo
    repoURL: 'https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git'
    targetRevision: HEAD
    # This points to the folder containing the YAMLs from our previous step
    path: deploy/components/gotenburg
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gotenburg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
