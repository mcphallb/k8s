apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git'
    targetRevision: HEAD
    path: 'deploy/apps' # This is where we will put our app manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
