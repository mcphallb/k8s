apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-storage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-repo/infra.git
    targetRevision: HEAD
    path: components/nfs-storage
    # Use Kustomize to inject your actual NFS Server IP
    kustomize:
      patches:
        - target:
            kind: PersistentVolume
            name: nfs-pv
          patch: |-
            - op: replace
              path: /spec/nfs/server
              value: 192.168.30.155
            - op: replace
              path: /spec/nfs/path
              value: /mnt/storage
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
