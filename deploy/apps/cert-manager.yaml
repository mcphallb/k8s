apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
    targetRevision: HEAD
    path: deploy/components/cert-manager  # Points to child app manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
