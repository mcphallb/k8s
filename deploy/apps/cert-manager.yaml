apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: 1.14.4
    helm:
      releaseName: cert-manager
      parameters:
        - name: installCRDs
          value: "true"
      # This is the "Magic" part: It tells the Helm chart to also 
      # include your specific Gitea manifests during installation
      values: |
        extraObjects: 
          - apiVersion: secrets.hashicorp.com/v1beta1
            kind: VaultStaticSecret
            metadata:
              name: cloudflare-api-token
              namespace: cert-manager
            spec:
              vaultAuthRef: static-auth
              mount: secret
              path: traefik/cloudflare
              type: kv-v2
              destination:
                name: cloudflare-api-token-secret
                create: true
          - apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            metadata:
              name: letsencrypt-cloudflare
            spec:
              acme:
                email: your-email@nibblesnbits.org
                server: https://acme-v02.api.letsencrypt.org/directory
                privateKeySecretRef:
                  name: letsencrypt-account-key
                solvers:
                - dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: cloudflare-api-token-secret
                        key: api-token
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
---
#apiVersion: secrets.hashicorp.com/v1beta1
#kind: VaultConnection
#metadata:
#  name: default
#  namespace: cert-manager
#spec:
#  address: http://vault.vault.svc.cluster.local:8200 # Update this to your Vault URL
#---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: static-auth-certmanager
  namespace: cert-manager
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: cert-manager-role # This role must exist in Vault with read access
    serviceAccount: default
  #vaultConnectionRef: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager # Make sure this matches your destination
spec:
  vaultAuthRef: static-auth-certmanager
  mount: secret
  type: kv-v2
  path: traefik/cloudflare
  destination:
    name: cloudflare-api-token-secret
    create: true