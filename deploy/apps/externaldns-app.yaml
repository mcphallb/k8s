apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-mikrotik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.15.0
    helm:
      values: |
        # Use the webhook provider logic
        provider:
          name: webhook
          webhook:
            # We must define the image here to satisfy the Helm template check
            image:
              repository: ghcr.io/mirceanton/external-dns-provider-mikrotik
              tag: v1.0.0
            # Explicitly map the MikroTik credentials to the sidecar
            env:
              - name: MIKROTIK_DEFAULT_TTL
                value: "10m"
              - name: MIKROTIK_DEFAULT_Comment
                value: "k8s"
              - name: MIKROTIK_BASEURL
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_BASEURL
              - name: MIKROTIK_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_USERNAME
              - name: MIKROTIK_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_PASSWORD
              - name: MIKROTIK_SKIP_TLS_VERIFY
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_SKIP_TLS_VERIFY
        
        # ExternalDNS main container settings
        extraArgs:
          - --webhook-provider-url=http://localhost:8888
        
        # Policy: upsert-only prevents it from deleting records it didn't create
        policy: upsert-only
        
        # Safety: only touch your local domain
        domainFilters:
          - chockablock.home
          
        # Ownership: helps ExternalDNS track its own records on the MikroTik
        txtOwnerId: chockablock-cluster
        
        # Recommended: interval for checking changes
        interval: 1m
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
