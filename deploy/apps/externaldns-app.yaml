apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-mikrotik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.15.0 # Use the latest stable
    helm:
      values: |
        extraArgs:
          - --provider=webhook
          - --webhook-provider-url=http://localhost:8888
        # We need to manually define the sidecar to ensure env vars are passed
        extraContainers:
          - name: webhook
            image: ghcr.io/mirceanton/external-dns-provider-mikrotik:v1.0.0
            ports:
              - containerPort: 8888
                name: webhook
            env:
              - name: MIKROTIK_BASEURL
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_BASEURL
              - name: MIKROTIK_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_USERNAME
              - name: MIKROTIK_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_PASSWORD
              - name: MIKROTIK_SKIP_TLS_VERIFY
                valueFrom:
                  secretKeyRef:
                    name: mikrotik-credentials
                    key: MIKROTIK_SKIP_TLS_VERIFY
        # This prevents ExternalDNS from deleting records it didn't create
        policy: upsert-only 
        # Only manage records ending in your local domain
        domainFilters:
          - chockablock.home 
        # Crucial: This marks the records so ExternalDNS knows which ones it "owns"
        txtOwnerId: chockablock-cluster 
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
