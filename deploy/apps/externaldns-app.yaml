apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-mikrotik
  namespace: argocd
  annotations:
    avp.kubernetes.io/path: "secret/data/external-dns/mikrotik"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.15.0
    helm:
      values: |
        provider:
          name: webhook
          webhook:
            image:
              repository: ghcr.io/mirceanton/external-dns-provider-mikrotik
              tag: v1.0.0
            env:
              - name: MIKROTIK_BASEURL
                value: "<MIKROTIK_BASEURL>" # AVP placeholder
              - name: MIKROTIK_USERNAME
                value: "<MIKROTIK_USERNAME>"
              - name: MIKROTIK_PASSWORD
                value: "<MIKROTIK_PASSWORD>"
              - name: MIKROTIK_SKIP_TLS_VERIFY
                value: "true"
        extraArgs:
          - --webhook-provider-url=http://localhost:8888
        policy: upsert-only
        domainFilters:
          - chockablock.home
        txtOwnerId: chockablock-cluster
        interval: 1m
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: static-auth
  namespace: external-dns
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: external-dns-role # This must match the role name configured in Vault
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: mikrotik-vault-sync
  namespace: external-dns
spec:
  vaultAuthRef: static-auth
  mount: secret  # Your KV engine mount point
  type: kv-v2
  path: external-dns # The path where your secrets live in Vault
  refreshAfter: 60s
  destSecret:
    name: mikrotik-credentials # This matches the name in your original App manifest
