apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
    targetRevision: HEAD
    path: deploy/components/longhorn  # Ensure this points to where longhorn.yaml is
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: longhorn-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
#    automated:
#      prune: false
#      selfHeal: true
