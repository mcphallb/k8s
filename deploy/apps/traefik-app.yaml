# /opt/chockablock/deploy/apps/traefik-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  sources:
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: 34.0.0
      helm:
        valueFiles:
          - $values/deploy/components/traefik/values.yaml
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# THE MAGIC BULLET: This makes your cert the global default
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: nibbles-wildcard-tls
---
# SECURE DASHBOARD ROUTE
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.nibblesnbits.org`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: nibbles-wildcard-tls