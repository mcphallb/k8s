# /opt/chockablock/deploy/apps/traefik-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  sources:
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: 39.0.0
      helm:
        valueFiles:
          - $values/deploy/components/traefik/values.yaml
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD
      ref: values # Used for the $values variable in the Helm chart above
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD
      path: deploy/components/traefik/manifests # WATCH THIS PATH for plain YAMLs
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# THE MAGIC BULLET: This makes your cert the global default
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: nibbles-wildcard-tls
---
# SECURE DASHBOARD ROUTE
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.nibblesnbits.org`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: nibbles-wildcard-tls
---
# 1. Provide a connection to Vault in this namespace
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: traefik-vault-conn
  namespace: traefik
spec:
  address: http://vault-server.vault.svc.cluster.local:8200 

---
# 2. Auth for the Traefik ServiceAccount
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: traefik-vault-auth
  namespace: traefik
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: traefik-vault-conn
  kubernetes:
    role: traefik-role # Assuming this role has access to the 'crowdsec' path
    serviceAccount: default # Ensure this matches your Traefik SA name

---
# 3. The Secret that creates "crowdsec-bouncer-key"
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: traefik-crowdsec-pull
  namespace: traefik
spec:
  type: kv-v2
  mount: secret 
  path: crowdsec/traefik # Same path where the key is stored
  destination:
    name: crowdsec-bouncer-key # THIS is what Traefik is looking for
    create: true
  vaultAuthRef: traefik-vault-auth