# /opt/chockablock/deploy/apps/traefik-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  sources:
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: 34.0.0
      helm:
        valueFiles:
          - $values/deploy/components/traefik/values.yaml
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD
      ref: values # Used for the $values variable in the Helm chart above
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD
      path: deploy/components/traefik/manifests # WATCH THIS PATH for plain YAMLs
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# THE MAGIC BULLET: This makes your cert the global default
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: nibbles-wildcard-tls
---
# SECURE DASHBOARD ROUTE
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.nibblesnbits.org`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: nibbles-wildcard-tls
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: crowdsec-bouncer-secret
  namespace: traefik # <--- Crucial: The bouncer needs it here
spec:
  type: kv-v2
  mount: secret 
  path: crowdsec # The same path you used for the CrowdSec app
  destination:
    name: crowdsec-bouncer-key # This is the name of the K8s secret it will create
    create: true
  vaultAuthRef: crowdsec-vault-auth # You can share the same connection/auth if configured