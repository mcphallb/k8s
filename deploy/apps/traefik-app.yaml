apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources: # MUST be plural
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: 34.0.0
      helm:
        valueFiles:
          # This refers to the 'ref' defined in the second source
          - $values/deploy/components/traefik/values.yaml 
    
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git # Change to your Git URL
      targetRevision: HEAD
      ref: values # This nickname maps to '$values' above
  
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.nibblesnbits.org`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: nibbles-wildcard-tls
    apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.nibblesnbits.org`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: nibbles-wildcard-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nibbles-wildcard-cert
  namespace: traefik # Putting it where Traefik can see it easily
spec:
  secretName: nibbles-wildcard-tls
  issuerRef:
    name: cloudflare-issuer
    kind: ClusterIssuer
  dnsNames:
    - "nibblesnbits.org"
    - "*.nibblesnbits.org"