apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kubernetes-sigs.github.io/headlamp/'
    chart: headlamp
    targetRevision: 0.40.1
    helm:
      values: |
        config:
          metricsEnabled: true
          sessionTTL: null
          oidc:
            clientID: "mMQYRhbdWUFAQB3JxJq0J73civxcbmcFFd1kWuD2"
            idpIssuerURL: "https://authentik.nibblesnbits.org/application/o/headlamp/"
            scopes: "openid,profile,email,groups"
            # VSO will create this secret in the 'headlamp' namespace
            clientSecretSecretName: "headlamp-oidc-secret"
            clientSecretKeyName: "oidc-client-secret"
        service:
          type: ClusterIP
          port: 80
        ingress:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: headlamp.nibblesnbits.org
              paths:
                - path: /
                  type: ImplementationSpecific
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# 1. THE CONNECTION
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: headlamp-vault-conn
  namespace: headlamp
spec:
  # Using the internal K8s DNS name for Vault
  address: http://vault-server.vault.svc.cluster.local:8200 
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: default # This matches what the StaticSecret is looking for
  namespace: headlamp
spec:
  method: kubernetes
  mount: kubernetes # The name of your K8s auth mount in Vault
  vaultConnectionRef: headlamp-vault-conn
  kubernetes:
    role: headlamp-role # The role you created in Vault for the operator
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: headlamp-vault-secret
  namespace: headlamp
spec:
  mount: secret # Adjust if your mount point is different (e.g., 'secret')
  type: kv-v2
  path: headlamp # Path in Vault (e.g., kv/headlamp)
  refreshAfter: 1h
  destination:
    name: headlamp-oidc-secret
    create: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-oidc-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: User
  name: mcpha1bj # Ensure this matches the 'Username' shown in your ArgoCD test
  apiGroup: rbac.authorization.k8s.io