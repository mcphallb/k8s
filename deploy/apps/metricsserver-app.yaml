apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kubernetes-sigs.github.io/metrics-server/'
    chart: metrics-server
    targetRevision: 3.13.0 # Latest stable as of early 2026
    helm:
      values: |
        args:
          # REQUIRED for Talos: Kubelets use self-signed certs
          - --kubelet-insecure-tls 
          - --kubelet-preferred-address-types=InternalIP
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system # Standard location for metrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
