apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git'
    targetRevision: HEAD
    path: 'deploy/components/argocd'
    helm:
      server:
        service:
          type: LoadBalancer
          annotations:
            external-dns.alpha.kubernetes.io/hostname: argocd.chockablock.home
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
