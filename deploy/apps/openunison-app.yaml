apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openunison-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://nexus.tremolo.io/repository/helm'
      chart: openunison-operator
      targetRevision: 3.0.23

    - repoURL: 'https://nexus.tremolo.io/repository/helm'
      chart: orchestra
      targetRevision: 3.1.34
      helm:
        valueFiles:
          - $values/deploy/components/openunison/values.yaml

    - repoURL: 'https://nexus.tremolo.io/repository/helm'
      chart: orchestra-login-portal
      targetRevision: 2.3.84
      helm:
        valueFiles:
          - $values/deploy/components/openunison/values.yaml

    # FIXED: Pointing to YOUR Gitea repo
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD # Or 'main' if that is your branch
      ref: values 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openunison
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions:
      - CreateNamespace=true