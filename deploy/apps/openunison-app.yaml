apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openunison-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://nexus.tremolo.io/repository/helm'
      chart: openunison-operator
      targetRevision: 3.0.23

    - repoURL: 'https://nexus.tremolo.io/repository/helm'
      chart: orchestra
      targetRevision: 3.1.34
      helm:
        valueFiles:
          - $values/deploy/components/openunison/values.yaml

    - repoURL: 'https://nexus.tremolo.io/repository/helm'
      chart: orchestra-login-portal
      targetRevision: 2.3.84
      helm:
        valueFiles:
          - $values/deploy/components/openunison/values.yaml

    # FIXED: Pointing to YOUR Gitea repo
    - repoURL: https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git
      targetRevision: HEAD # Or 'main' if that is your branch
      ref: values 
  destinations:
    - name: openldap
      type: ldap
      hostname: openldap.openunison.svc.cluster.local
      port: 389
      encryption: none # Change to tls if using 636
      # This pulls the bind credentials from the Vault-synced secret
      auth_dn: cn=admin,dc=nibblesnbits,dc=org
      auth_pass: 
        secret_name: orchestra-secrets-source
        secret_key: LDAP_ADMIN_PASSWORD
      base_dn: dc=nibblesnbits,dc=org
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openunison
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions:
      - CreateNamespace=true