apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openunison
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://nexus.tremolo.io/repository/helm/'
      chart: orchestra
      targetRevision: 1.0.126 # Use a known stable version
      helm:
        valueFiles:
          - $values/deploy/component/openunison/values.yaml
    - repoURL: 'https://gitea.nibblesnbits.org/mcpha1bj/chockablock.git' # Your Git Repo
      targetRevision: HEAD
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openunison
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true