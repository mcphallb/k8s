apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://argocd.nibblesnbits.org
  oidc.config: |
    name: Authentik
    issuer: https://authentik.nibblesnbits.org/application/o/argocd/
    clientID: "elaXahqcEhGoJwoz342ateZKnEwdxq5uB0nLoGYm"
    clientSecret: $oidc.auth0.clientSecret
    requestedScopes: ["openid", "profile", "email", "groups"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
data:
  # Sets the default for anyone who logs in but isn't in a group below
  policy.default: role:readonly
  # The 'scopes' line tells Argo which claim to look at for groups
  scopes: '[groups]'
  policy.csv: |
    # Syntax: g, <Authentik Group Name>, <Argo Role>
    g, ArgoCD Admin, role:admin
    g, ArgoCD Viewer, role:readonly