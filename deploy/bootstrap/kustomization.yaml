apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This ensures all resources (including the remote ones) 
# are forced into the 'argocd' namespace
namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - root.yaml

patches:
  - path: patch-argocd-server-lb.yaml
