apiVersion: v1
kind: PersistentVolume
metadata:
  name: meshmonitor-nfs-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.0.79 # Update to your NFS Server IP
    path: /mnt/nfs/meshmonitor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meshmonitor-nfs-pvc
  namespace: meshmonitor # Must match the app namespace
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
