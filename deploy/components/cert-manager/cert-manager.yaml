apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Use sync-waves to ensure infra like cert-manager installs before your apps
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: quay.io/jetstack/charts
    targetRevision: v1.19.4 # Use the latest stable version
    helm:
      version: v3
      values: |
        installCRDs: true  # Vital: cert-manager needs its CRDs to function
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager # Recommended to keep in its own namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
