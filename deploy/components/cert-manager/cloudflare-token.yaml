apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend # Must match your ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token-secret # This is what cert-manager will read
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: traefik/cloudflare
        property: CLOUDFLARE_DNS_API_TOKEN