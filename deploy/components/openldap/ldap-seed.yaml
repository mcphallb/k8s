apiVersion: v1
kind: ConfigMap
metadata:
  name: openldap-bootstrap-script
  namespace: openunison
data:
  bootstrap.sh: |
    #!/bin/sh
    # This script runs before the LDAP server starts.
    # It generates the LDIF using the environment variable from Vault.
    
    cat <<EOF > /container/service/slapd/assets/config/bootstrap/ldif/custom/01-structure.ldif
    dn: ou=people,dc=nibblesnbits,dc=org
    objectClass: organizationalUnit
    ou: people

    dn: ou=groups,dc=nibblesnbits,dc=org
    objectClass: organizationalUnit
    ou: groups

    dn: cn=k8s_admins,ou=groups,dc=nibblesnbits,dc=org
    objectClass: groupOfNames
    cn: k8s_admins
    member: uid=adminuser,ou=people,dc=nibblesnbits,dc=org

    dn: uid=adminuser,ou=people,dc=nibblesnbits,dc=org
    objectClass: inetOrgPerson
    objectClass: posixAccount
    uid: adminuser
    sn: Admin
    cn: Test Admin
    userPassword: ${TEST_USER_PASSWORD}
    uidNumber: 1000
    gidNumber: 1000
    homeDirectory: /home/adminuser
    EOF