apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # 1. This is the "Base" that already has the argocd-server Service
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

patches:
  # 2. Use your file as a patch instead of a resource
  - path: service-lb.yaml
    target:
      kind: Service
      name: argocd-server

  # 3. Your existing ConfigMap patch
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      - op: add
        path: /data/url
        value: https://argocd.nibblesnbits.org
