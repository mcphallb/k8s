apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # The same manifest we used in the Makefile
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

patches:
  - path: service-lb.yaml
    target:
      kind: Service
      name: argocd-server
    patch: |-
      - op: replace
        path: /data/url
        value: https://argocd.nibblesnbits.org
