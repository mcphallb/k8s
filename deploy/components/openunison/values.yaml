network:
  openunison_host: "login.nibblesnbits.org"
  api_server_host: "openunison.nibblesnbits.org"
  session_inactivity_timeout_seconds: 900
  k8s_url: https://192.168.30.10:6443
  force_redirect_to_tls: false
  createIngressCertificate: true
  ingress_type: traefik
  ingress_annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

cert_template:
  ou: "Kubernetes"
  o: "nibblesnbits"
  l: "chockablock"
  st: "MI"
  c: "US"



myvd_config_path: "WEB-INF/myvd.conf"
k8s_cluster_name: chockablock
enable_impersonation: false

impersonation:
  use_jetstack: true
  explicit_certificate_trust: true

headlamp:
  enabled: true

dashboard:
  enabled: false

certs:
  use_k8s_cm: false

trusted_certs: []

monitoring:
  prometheus_service_account: system:serviceaccount:monitoring:prometheus-k8s

