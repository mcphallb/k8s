network:
  openunison_host: "login.nibblesnbits.org"
  api_server_host: "openunison.nibblesnbits.org"
  session_inactivity_timeout_seconds: 900
  k8s_url: https://192.168.30.10:6443
  force_redirect_to_tls: false
  createIngressCertificate: true
  ingress_type: traefik
  ingress_annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

cert_template:
  ou: "Kubernetes"
  o: "nibblesnbits"
  l: "chockablock"
  st: "MI"
  c: "US"



myvd_config_path: "WEB-INF/myvd.conf"
k8s_cluster_name: chockablock
enable_impersonation: false

impersonation:
  use_jetstack: true
  explicit_certificate_trust: true

headlamp:
  enabled: true

dashboard:
  enabled: false

certs:
  use_k8s_cm: false

trusted_certs: []

monitoring:
  prometheus_service_account: system:serviceaccount:monitoring:prometheus-k8s

# Uncomment one of the below options for authentication

active_directory:
  base: dc=nibblesnbits,dc=org
  host: "ds389.openunison.svc.cluster.local"
  port: "3389"
  bind_dn: "cn=Directory Manager"
  con_type: ldap
  srv_dns: "false"
  # ADD THESE TWO LINES:
  search_filter: "(uid={0})"
  user_id_attribute: "uid"

myvd:
  config:
    # 1. Map 389-ds attributes so OpenUnison's portal logic understands them
    - name: "attribute_mapper"
      className: "net.sourceforge.myvd.inserts.mapping.AttributeMapper"
      options:
        # Syntax: RemoteName=LocalName
        mapping: "uid=sAMAccountName,uniqueMember=memberOf"

    # 2. The actual connection to your 389-ds pod
    - name: "389ds-ldap"
      className: "net.sourceforge.myvd.inserts.ldap.LdapInsert"
      options:
        host: "ds389.openunison.svc.cluster.local"
        port: "3389"
        remoteBase: "dc=nibblesnbits,dc=org"
        proxyDN: "cn=Directory Manager"
        proxyPass: "AD_BIND_PASSWORD" # This tells it to look in the Secret we created
    - name: "accesslog"
      className: "com.tremolosecurity.proxy.myvd.log.AccessLog"
      options:
        # This will send MyVD logs to the standard pod output (stdout)
        logLevel: "info"

