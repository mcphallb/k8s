network:
  # Changed from nginx to traefik
  ingress_type: traefik
  openunison_host: "openunison.nibblesnbits.org"
  api_server_host: "k8sapi.nibblesnbits.org"
  # You must add a third unique host for the dashboard/portal
  dashboard_host: "portal.nibblesnbits.org"
  
  # MetalLB handles the IP, Traefik handles the routing
  ingress_annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  
  # Point to your cluster's API server
  k8s_url: https://kubernetes.default.svc
  force_redirect_to_tls: true

# NO EXTERNAL IAM SETUP
# This tells OpenUnison to use its own database for users
orchestra:
  is_internal_db: false
  enable_provisioning: false

services:
  enable_tokenrequest: false
  token_request_audience: api
  token_request_expiration_seconds: 600
  node_selectors: []

# DATABASE (NFS BACKED)
# This replaces the commented-out database section in your example
#database:
#  type: postgres
#  embedded: true
#  persistence:
#    enabled: true
#    storageClass: "nfs-client" # Matches your NFS provider
#    size: 10Gi

# SECRETS (VAULT INTEGRATION)
# OpenUnison will look for the secret 'orchestra-secrets-source' 
# that your Vault Secrets Operator is syncing.
openunison:
  ldap_type: standard
  auto_timestamp: false
  force_update: initial-deployment
  replicas: 1
  enable_provisioning: true
  non_secret_data:
    SHOW_PORTAL_ORGS: "false"
  enable_internal_db: false
  db_host: openunison-db  # This points to the internal AMQ pod's DB service
  db_type: mysql

database:
  hibernate_dialect: org.hibernate.dialect.MySQL5InnoDBDialect
  quartz_dialect: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
  driver: com.mysql.jdbc.Driver
  # Update to point to your new service
  value: "jdbc:mysql://openunison-db:3306/unison?useSSL=false&amp;allowPublicKeyRetrieval=true"
#  url: jdbc:mysql://openunison-db.openunison.svc.cluster.local:3306/unison?useSSL=false
  user: root
  validation: SELECT 1

# DISABLED PROVIDERS
# Ensure all these are commented out or set to false
active_directory: 
  host: openldap-svc.openunison.svc.cluster.local
  port: 389
  base: dc=nibblesnbits,dc=org
  bind_dn: "cn=admin,dc=nibblesnbits,dc=org"
  con_type: "ldap"
  srv_dns: "false"
#oidc: 
#  enabled: false
#github: 
#  enabled: false
#saml: 
#  enabled: false

# NETWORK POLICIES
# Set to false initially to ensure Traefik can talk to OpenUnison
network_policies:
  enabled: false
  ingress:
    enabled: true
    labels:
      app.kubernetes.io/name: ingress-traefik
  monitoring:
    enabled: true
    labels:
      app.kubernetes.io/name: monitoring
  apiserver:
    enabled: false
    labels:
      app.kubernetes.io/name: kube-system

