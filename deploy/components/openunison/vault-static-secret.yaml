apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: openunison-vault-sync
  namespace: openunison
spec:
  mount: secret
  type: kv-v2
  path: openunison/orchestra-keys
  destination:
    name: orchestra-secrets-source # This is the name OpenUnison looks for
    create: true
  refreshAfter: 1h
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: default
  namespace: openunison
spec:
  address: http://vault.vault.svc.cluster.local:8200 # Update to your Vault address
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: static-auth
  namespace: openunison
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: openunison-role # This role must exist in Vault
    serviceAccount: default
