apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: openunison-vault-sync
  namespace: openunison
spec:
  vaultAuthRef: openunison-auth
  mount: secret
  type: kv-v2
  # The path where we stored the LDAP/AD passwords
  path: openunison/orchestra-keys 
  destination:
    # This is the secret name the OpenUnison pods are looking for
    name: orchestra-secrets-source 
    create: true 
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: default
  namespace: openunison
spec:
  address: http://vault.vault.svc.cluster.local:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: openunison-auth
  namespace: openunison
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    # This must match the 'openunison-role' we created in Vault earlier
    role: openunison-role 
    serviceAccount: default