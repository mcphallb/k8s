apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: main-pool
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "5" # Higher number = happens later
spec:
  addresses:
  - 192.168.30.200-192.168.30.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: main-advertisement
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  ipAddressPools:
  - main-pool
