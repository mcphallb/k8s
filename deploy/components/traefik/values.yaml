ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.nibblesnbits.org`)
    entryPoints:
      - websecure
    tls:
      secretName: nibbles-wildcard-tls
    
api:
  dashboard: true
  insecure: true

logs:
  general:
    level: DEBUG
  # This enables access logs, outputting them to Traefik's standard output by default. The [Access Logs Documentation](https://doc.traefik.io/traefik/observability/access-logs/) covers formatting, filtering, and output options.
  access:
    enabled: true

experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.4.5" # Use the latest stable version

ports:
  web:
    forwardedHeaders:
      trustedIPs: &trustedIPs
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
        # Cloudflare IPv6
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/33
        # Internal Networks (So you see your own LAN IPs)
        - 10.244.0.0/16
        - 10.0.0.0/8
        - 192.168.0.0/16
  websecure:
    forwardedHeaders:
      trustedIPs: *trustedIPs
  internal:
    port: 9000
    exposedPort: 443 
    protocol: TCP
    forwardedHeaders:
      trustedIPs: *trustedIPs

additionalArguments:
  - "--providers.kubernetesingress.ingressclass=traefik"

persistence:
  enabled: true
  path: /data


service:
  enabled: true
  type: LoadBalancer
  loadBalancerIP: "192.168.30.200"
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.30.200"

providers:
  kubernetesIngress:
    publishedService:
      enabled: true
      # Format: "namespace/service-name"
      pathOverride: "traefik/traefik"

