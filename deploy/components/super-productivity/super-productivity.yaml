apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: super-productivity
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-user/gitops-repo.git
    targetRevision: HEAD
    path: apps/super-productivity
  destination:
    server: https://kubernetes.default.svc
    namespace: super-productivity # Namespace where the app will live
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true