# 1. THE CONNECTION
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: super-productivity-vault-conn
  namespace: super-productivity
spec:
  address: http://vault-server.vault.svc.cluster.local:8200 

---
# 2. THE AUTH
apiVersion: secrets.hashicorp.com/v1beta1 # Changed from v2beta1 for compatibility
kind: VaultAuth
metadata:
  name: super-productivity-vault-auth
  namespace: super-productivity
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: super-productivity-vault-conn
  kubernetes:
    role: super-productivity-role
    serviceAccount: default

---
# 3. THE SECRET
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: super-productivity-secrets
  namespace: super-productivity
spec:
  type: kv-v2
  mount: secret 
  path: super-productivity
  destination:
    name: super-productivity-secrets 
    create: true
  vaultAuthRef: super-productivity-vault-auth