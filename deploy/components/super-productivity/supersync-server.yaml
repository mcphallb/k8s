apiVersion: apps/v1
kind: Deployment
metadata:
  name: supersync-server
  namespace: super-productivity
spec:
  selector:
    matchLabels:
      app: supersync-server
  template:
    metadata:
      labels:
        app: supersync-server
    spec:
      containers:
      - name: supersync
        # Updated image name to the correct official repository
        image: 43ntropy/supersync:latest
        env:
        - name: PORT
          value: "1900"
        - name: PUBLIC_URL
          value: "https://supersync.nibblesnbits.org"
        - name: SESSION_COOKIE_DOMAIN
          value: "nibblesnbits.org"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: super-productivity-secrets
              key: JWT_SECRET
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: super-productivity-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql://supersync:$(DATABASE_PASSWORD)@supersync-db-svc:5432/supersync_db"
        ports:
        - containerPort: 1900
---
apiVersion: v1
kind: Service
metadata:
  name: supersync-server-svc
  namespace: super-productivity
spec:
  type: ClusterIP
  selector:
    app: supersync-server
  ports:
  - port: 1900
    targetPort: 1900