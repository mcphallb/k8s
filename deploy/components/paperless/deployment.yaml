apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless # This MUST match the template label below
  template:
    metadata:
      labels:
        app: paperless # The "badge" for the Pod
    spec:
      securityContext:
        fsGroup: 1000 # Critical for Longhorn permissions
      containers:
        # --- COMPONENT 1: The App ---
        - name: paperless-web
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.8
          env:
            - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
              value: "https://paperless.nibblesnbits.org"
            - name: PAPERLESS_TIKA_ENABLED
              value: "1"
            - name: PAPERLESS_TIKA_ENDPOINT
              value: "http://localhost:9998"
            - name: PAPERLESS_TIKA_GOTENBURG_ENDPOINT
              value: "http://localhost:3000"
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_SECRET_KEY
            - name: PAPERLESS_DBPASS # Use this in your DB connection string
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: DB_PASS
            - name: PAPERLESS_REDIS
              value: "redis://redis:6379"
            - name: PAPERLESS_DBHOST
              value: "postgres"
            - name: PAPERLESS_OCR_LANGUAGE
              value: "eng"
            - name: PAPERLESS_CONSUMER_ENABLE_BARCODES
              value: "true"
            - name: PAPERLESS_CONSUMER_ENABLE_ASN_BARCODE
              value: "true"
            - name: PAPERLESS_CONSUMER_ASN_BARCODE_PREFIX
              value: "ASN"
            - name: PAPERLESS_CONSUMER_ENABLE_COLLATE_DOUBLE_SIDED
              value: "true"
            - name: PAPERLESS_CONSUMER_RECURSIVE
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume

        # --- COMPONENT 2: The FTP Hack Sidecar ---
        - name: ftp-server
          image: stilliard/pure-ftpd:latest
          env:
            - name: FTP_USER_NAME
              value: "printer"
            - name: FTP_USER_PASS
              value: "scan123"
            - name: FTP_USER_HOME
              value: "/home/printer"
            - name: PUBLICHOST
              value: "192.168.30.204"
            - name: FTP_PASSIVE_PORTS
              value: "30000:30009"
          ports:
            - containerPort: 21
            - containerPort: 30000 # Passive range
            - containerPort: 30001
            - containerPort: 30002
            - containerPort: 30003
            - containerPort: 30004
            - containerPort: 30005
          volumeMounts:
            - name: consume
              mountPath: /home/printer

        - name: gotenberg
          image: gotenberg/gotenberg:8.7
          # Gotenberg uses a non-root user (1001), which is fine.

        - name: tika
          image: apache/tika:latest-full
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: import-data
          persistentVolumeClaim:
            claimName: paperless-import-pvc
