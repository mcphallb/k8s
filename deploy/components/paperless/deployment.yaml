apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
spec:
  replicas: 1
  template:
    spec:
      securityContext:
        fsGroup: 1000 # Critical for Longhorn permissions
      containers:
        # --- COMPONENT 1: The App ---
        - name: paperless-web
          image: ghcr.io/paperless-ngx/paperless-ngx:2.14.7
          env:
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_SECRET_KEY
            - name: PAPERLESS_DBPASS # Use this in your DB connection string
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: DB_PASS
            - name: PAPERLESS_REDIS
              value: redis://redis:6379
            - name: PAPERLESS_DBHOST
              value: postgres
            - name: PAPERLESS_OCR_LANGUAGE
              value: eng
            # Add other envs as needed
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume

        # --- COMPONENT 2: The FTP Hack Sidecar ---
        - name: ftp-server
          image: stilliard/pure-ftpd:alpine
          env:
            - name: FTP_USER_NAME
              value: "printer"
            - name: FTP_USER_PASS
              value: "scan123"
            - name: FTP_USER_HOME
              value: "/home/printer"
          ports:
            - containerPort: 21
            - containerPort: 30000 # Passive range
          volumeMounts:
            - name: consume
              mountPath: /home/printer # Points to the same PVC as paperless
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
