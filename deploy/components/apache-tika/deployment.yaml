apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
    spec:
      containers:
      - name: tika
        image: apache/tika:latest
        ports:
        - containerPort: 9998
---
apiVersion: v1
kind: Service
metadata:
  name: tika
spec:
  ports:
  - port: 9998
    targetPort: 9998
  selector:
    app: tika

