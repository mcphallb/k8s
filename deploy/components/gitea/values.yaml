# values.yaml
gitea:
  admin:
    existingSecret: gitea-admin
  config:
    server:
      DOMAIN: gitea.nibblesnbits.org
      ROOT_URL: https://gitea.nibblesnbits.org
      SSH_DOMAIN: gitea.nibblesnbits.org
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 22

ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
  hosts:
    - host: gitea.nibblesnbits.org
      paths:
        - path: /
          pathType: Prefix

persistence:
  enabled: true
  size: 10Gi

ports:
  gitea-ssh:
    port: 2222
    expose:
      default: true
    exposedPort: 2222
    protocol: TCP

postgresql-ha:
  ## @param postgresql-ha.enabled Enable PostgreSQL HA
  enabled: true
  postgresql:
    image:
      repository: bitnamilegacy/postgresql-repmgr
  pgpool:
    image:
      repository: bitnamilegacy/pgpool