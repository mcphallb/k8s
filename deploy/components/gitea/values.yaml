# values.yaml
gitea:
  admin:
    existingSecret: gitea-admin
  config:
    server:
      DOMAIN: gitea.nibblesnbits.org
      ROOT_URL: https://gitea.nibblesnbits.org
      SSH_DOMAIN: gitea.nibblesnbits.org
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 22
    database:
      DB_TYPE: postgres
      HOST: gitea-postgresql:5432
  additionalConfigFromEnvs:
    - name: GITEA__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db-secret
          key: password



ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
  hosts:
    - host: gitea.nibblesnbits.org
      paths:
        - path: /
          pathType: Prefix

persistence:
  enabled: true
  size: 10Gi

ports:
  gitea-ssh:
    port: 2222
    expose:
      default: true
    exposedPort: 2222
    protocol: TCP

valkey-cluster:
  enabled: false

valkey:
  enabled: true

postgresql-ha:
  enabled: false

postgresql:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi
  auth:
    username: gitea
    database: gitea
    existingSecret: "gitea-db-secret"
    secretKeys:
      userPasswordKey: "password"
      adminPasswordKey: "password"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 20
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 20
    failureThreshold: 10
  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30 # Gives it 5 minutes to start before failing