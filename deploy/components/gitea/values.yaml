# values.yaml
gitea:
  admin:
    existingSecret: gitea-admin
  config:
    server:
      DOMAIN: gitea.nibblesnbits.org
      ROOT_URL: https://gitea.nibblesnbits.org
      SSH_DOMAIN: gitea.nibblesnbits.org
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 22
    database:
      DB_TYPE: postgres

ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
  hosts:
    - host: gitea.nibblesnbits.org
      paths:
        - path: /
          pathType: Prefix

persistence:
  enabled: true
  size: 10Gi

ports:
  gitea-ssh:
    port: 2222
    expose:
      default: true
    exposedPort: 2222
    protocol: TCP

valkey-cluster:
  enabled: false

valkey:
  enabled: true

postgresql-ha:
  enabled: false

postgres:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi