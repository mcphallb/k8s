clusterName: metal-cluster
talosVersion: v1.12.2
kubernetesVersion: 1.32.0
endpoint: https://192.168.30.10:6443
talsecret: talsecret.yaml

nodes:
  - hostname: control-01
    ipAddress: 192.168.30.10
    controlPlane: true
    installDisk: /dev/sda
  - hostname: wk-01
    ipAddress: 192.168.30.20
    controlPlane: false
    installDisk: /dev/sda
  - hostname: wk-02
    ipAddress: 192.168.30.21
    controlPlane: false
    installDisk: gdev/sda

controlPlane:
  patches:
    - |-
      machine:
        install:
          image: factory.talos.dev/metal-installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba:v1.12.3

worker:
  patches:
    - |-
      machine:
        install:
          image: factory.talos.dev/metal-installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba:v1.12.3
